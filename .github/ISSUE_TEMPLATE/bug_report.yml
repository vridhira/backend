name: Bug Report
description: Report a reproducible bug
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Clear and concise bug description
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: Add exact steps
      placeholder: |
        1. Go to ...
        2. Call ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: OS, Node version, package manager, branch
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Include relevant logs, stack traces, screenshots

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues first
          required: true
        - label: This is not a security vulnerability report
          required: true
