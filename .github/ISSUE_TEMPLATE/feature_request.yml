name: Feature Request
description: Suggest a new feature or enhancement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What user/problem does this solve?
      placeholder: The current behavior makes it difficult to...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe your preferred approach
      placeholder: I propose we add...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      placeholder: Other approaches evaluated

  - type: textarea
    id: impact
    attributes:
      label: Impact and Risk
      description: Mention security, performance, or compatibility implications

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I checked existing issues and discussions
          required: true
        - label: This request respects current licensing policy
          required: true
